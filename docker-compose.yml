version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mahaathithi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mahaathithi
      POSTGRES_USER: mahaathithi_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MahaAthithi@2024Secure}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahaathithi_admin -d mahaathithi"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=100

  redis:
    image: redis:7-alpine
    container_name: mahaathithi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
