version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: mahaatithi-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  admin-panel:
    build:
      context: ./admin-panel
    container_name: mahaatithi-admin
    ports:
      - "${VITE_PORT:-5173}:5173"
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
    depends_on:
      - backend
    restart: unless-stopped
