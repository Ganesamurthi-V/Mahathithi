version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mahaatithi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mahaatithi
      POSTGRES_USER: mahaatithi_admin
      # C7 FIX: :? means Docker will error at startup if POSTGRES_PASSWORD is not set.
      # The old fallback (:-MahaAtithi@2024Secure) was a real password committed in the repo.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    # C7 FIX: use 'expose' not 'ports' so the DB is only reachable by other
    # containers on this compose network — NOT published to the host OS or internet.
    # If you need direct DB access for ops, use: docker exec -it mahaatithi_db psql ...
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahaatithi_admin -d mahaatithi"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=100

  redis:
    image: redis:7-alpine
    container_name: mahaatithi_redis
    restart: unless-stopped
    # C7 FIX: require a password and only expose to container network (not to host)
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      # C7 FIX: pass password to health check ping now that auth is required
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

